name: "Envios PR Preview"

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: envios

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: envios-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ACCESS_KEY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository
        id: ecr
        run: |
          REPO_URL="$(aws ssm get-parameter --name "/smartlogix/ecr/${SERVICE_NAME}" --query 'Parameter.Value' --output text)"
          echo "repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push PR image
        id: image
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_URI="${{ steps.ecr.outputs.repo_url }}:pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service with preview image
        run: |
          aws ecs update-service \
            --cluster ecs-cluster-smartlogix-pr-${{ github.event.pull_request.number }} \
            --service srv-${{ env.SERVICE_NAME }}-pr-${{ github.event.pull_request.number }} \
            --force-new-deployment

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- envios-preview-comment -->';
            const body = [
              marker,
              '✅ Preview de **ms-envios** desplegado.',
              `- Imagen: \`${{ steps.image.outputs.image_uri }}\``,
              `- Endpoint: \`/api/envios\``
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  destroy-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ACCESS_KEY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale down preview service
        run: |
          aws ecs update-service \
            --cluster ecs-cluster-smartlogix-pr-${{ github.event.pull_request.number }} \
            --service srv-${{ env.SERVICE_NAME }}-pr-${{ github.event.pull_request.number }} \
            --desired-count 0
